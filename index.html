<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Learn Korean Vocabulary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Learn Korean Vocabulary</h1>

<div id="word-container">
    <p id="korean" class="clickable">Từ tiếng Hàn</p>
    <p id="vietnamese" class="hidden">Nghĩa tiếng Việt</p>
    <p id="statusText"></p>
    <p id="progress"></p>
</div>

<div id="buttons">
    <button id="knownBtn">✅ Remembered</button>
    <button id="unknownBtn">❌ Not Remembered</button>
    <button id="resetBtn">🔄 Reset</button>
</div>

<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
